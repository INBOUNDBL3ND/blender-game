<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blender</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; touch-action: none; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0; padding: 14px 20px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 10; pointer-events: none;
  }
  .ui-box {
    background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-radius: 10px; padding: 8px 16px;
    font-family: 'Helvetica Neue', sans-serif; font-weight: 700;
    font-size: 16px; color: white;
  }
  .ui-box small { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.5); display: block; }
  #size-indicator {
    position: fixed; top: 60px; left: 20px; z-index: 10; pointer-events: none;
  }
  #size-bar-wrap {
    width: 120px; height: 6px; background: rgba(255,255,255,0.1);
    border-radius: 3px; overflow: hidden;
  }
  #size-bar {
    height: 100%; width: 20%; border-radius: 3px; transition: width 0.3s, background 0.3s;
    background: linear-gradient(90deg, #4ecdc4, #2E9ED6);
  }
  #size-label {
    font-family: 'Helvetica Neue', sans-serif; font-size: 10px;
    color: rgba(255,255,255,0.4); margin-bottom: 4px;
  }
  #progress-wrap {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    width: 180px; height: 6px; background: rgba(255,255,255,0.1);
    border-radius: 3px; z-index: 10; pointer-events: none; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%; background: linear-gradient(90deg, #e85d26, #ff9a56);
    border-radius: 3px; transition: width 0.3s;
  }
  #progress-label {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    font-family: 'Helvetica Neue', sans-serif; font-size: 10px;
    color: rgba(255,255,255,0.35); z-index: 10; pointer-events: none;
  }
  #start-screen {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding-bottom: 80px;
    font-family: 'Helvetica Neue', sans-serif; color: white;
    overflow: hidden;
  }
  #start-bg {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #0d1520 0%, #162035 30%, #1a2744 60%, #0d1520 100%);
  }
  #start-city {
    position: absolute; bottom: 0; left: 0; right: 0; height: 55%;
    overflow: hidden;
  }
  #start-city canvas { width: 100%; height: 100%; }
  #start-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(13,21,32,0) 0%, rgba(13,21,32,0.3) 40%, rgba(13,21,32,0.85) 70%, rgba(13,21,32,1) 100%);
  }
  #start-content { position: relative; z-index: 2; text-align: center; }
  .logo-wrap { margin-bottom: 16px; }
  .logo-circle {
    width: 100px; height: 100px; border-radius: 28px; margin: 0 auto 20px;
    background: linear-gradient(135deg, #e85d26 0%, #ff8040 50%, #e85d26 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 40px rgba(232,93,38,0.4), 0 0 0 1px rgba(255,255,255,0.08);
    position: relative; overflow: hidden;
  }
  .logo-circle::before {
    content: ''; position: absolute; inset: 3px; border-radius: 25px;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent 60%);
  }
  .logo-inner {
    width: 56px; height: 56px; border-radius: 50%;
    background: radial-gradient(circle, #0a0a1a 25%, #1a1a30 50%, transparent 52%);
    position: relative;
  }
  .logo-blade {
    position: absolute; top: 50%; left: 50%; width: 2px; height: 22px;
    background: linear-gradient(180deg, rgba(232,93,38,0.8), rgba(232,93,38,0.1));
    transform-origin: top center; border-radius: 1px;
  }
  .title { font-size: 56px; font-weight: 900; letter-spacing: -1px; margin-bottom: 4px; line-height: 1; }
  .title span { color: #e85d26; }
  .subtitle { font-size: 14px; color: rgba(255,255,255,0.35); margin-bottom: 6px; letter-spacing: 3px; text-transform: uppercase; font-weight: 500; }
  .tagline { font-size: 15px; color: rgba(255,255,255,0.5); margin-bottom: 32px; font-weight: 400; }
  .btn {
    padding: 18px 72px; background: linear-gradient(135deg, #e85d26, #ff7a3a);
    color: white; border: none; border-radius: 16px; font-size: 20px; font-weight: 800;
    cursor: pointer; font-family: 'Helvetica Neue', sans-serif; touch-action: manipulation;
    box-shadow: 0 6px 30px rgba(232,93,38,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    letter-spacing: 2px; text-transform: uppercase;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:active { transform: scale(0.96); box-shadow: 0 3px 15px rgba(232,93,38,0.4); }
  .start-footer {
    margin-top: 20px; font-size: 11px; color: rgba(255,255,255,0.2);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .rating-stars { margin-bottom: 8px; font-size: 18px; letter-spacing: 2px; }
  .rating-stars span { color: #ffaa00; }
  .rating-text { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 20px; }
  #level-screen {
    position: fixed; inset: 0; z-index: 20; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0d1520 0%, #1a2744 100%);
    font-family: 'Helvetica Neue', sans-serif; color: white;
  }
  .level-title { font-size: 48px; font-weight: 900; margin-bottom: 8px; }
  .level-sub { font-size: 14px; color: rgba(255,255,255,0.35); margin-bottom: 32px; }
  #too-small {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Helvetica Neue', sans-serif; font-size: 14px; font-weight: 600;
    color: #ff6b6b; z-index: 10; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    background: rgba(0,0,0,0.4); padding: 8px 18px; border-radius: 8px;
  }
</style>
</head>
<body>

<div id="start-screen">
  <div id="start-bg"></div>
  <canvas id="start-city-canvas" style="position:absolute;bottom:0;left:0;right:0;height:55%;width:100%;"></canvas>
  <div id="start-overlay"></div>
  <div id="start-content">
    <div class="logo-wrap">
      <div class="logo-circle">
        <div class="logo-inner">
          <div class="logo-blade" style="transform:rotate(0deg) translateX(-50%)"></div>
          <div class="logo-blade" style="transform:rotate(60deg) translateX(-50%)"></div>
          <div class="logo-blade" style="transform:rotate(120deg) translateX(-50%)"></div>
          <div class="logo-blade" style="transform:rotate(180deg) translateX(-50%)"></div>
          <div class="logo-blade" style="transform:rotate(240deg) translateX(-50%)"></div>
          <div class="logo-blade" style="transform:rotate(300deg) translateX(-50%)"></div>
        </div>
      </div>
    </div>
    <div class="subtitle">CITY DESTROYER</div>
    <div class="title"><span>B</span>LENDER</div>
    <div class="tagline">Devour the city block by block</div>
    <div class="rating-stars"><span>&#9733;&#9733;&#9733;&#9733;&#9733;</span></div>
    <div class="rating-text">4.9 &bull; 127K Ratings</div>
    <button class="btn" id="start-btn">PLAY</button>
    <div class="start-footer">Free to Play</div>
  </div>
</div>

<div id="level-screen">
  <div class="level-title" id="level-title">Level 1</div>
  <div class="level-sub" id="level-sub">Clear the city!</div>
  <button class="btn" id="level-btn">GO</button>
</div>

<div id="ui">
  <div class="ui-box"><small>SCORE</small><span id="score">0</span></div>
  <div class="ui-box"><small>LEVEL</small><span id="level-label">1</span></div>
</div>
<div id="size-indicator">
  <div id="size-label">BLENDER SIZE</div>
  <div id="size-bar-wrap"><div id="size-bar"></div></div>
</div>
<div id="progress-label">BUILDINGS REMAINING</div>
<div id="progress-wrap"><div id="progress-bar"></div></div>
<div id="too-small">Too small! Eat smaller buildings first</div>

<canvas id="game"></canvas>

<script>
(function() {
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var W, H;
  var player, buildings, trees, cars, people, particles, eaten, totalBuildings, level, score, gameRunning;
  var worldW, worldH, camX, camY;
  var touchStartX, touchStartY, touchX, touchY, touching;
  var bladeAngle = 0;
  var tooSmallTimer = 0;
  var maxBuildingW = 0;

  var CAR_COLORS = ['#cc3333','#3366cc','#33aa33','#eeee33','#ffffff','#222222','#cc6600','#8833aa','#cc3388','#44cccc'];
  var SKIN_COLORS = ['#f4c7a0','#d4a06a','#8d5524','#c68642','#e8b88a','#6b4423'];
  var SHIRT_COLORS = ['#cc3333','#3366cc','#33aa33','#eeee33','#ff6600','#8833aa','#cc3388','#ffffff','#333333','#44cccc'];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  // Building color palettes (wall, accent, roof)
  var PALETTES = [
    { wall: '#8b9dad', accent: '#6b7d8d', roof: '#5a6a7a', win: '#ffe8a0' },  // grey office
    { wall: '#c4956a', accent: '#a07850', roof: '#7a5a3a', win: '#fff4c0' },  // brown brick
    { wall: '#a0b8c8', accent: '#7a98b0', roof: '#5a7890', win: '#ffeaa0' },  // blue glass
    { wall: '#d4a0a0', accent: '#b48080', roof: '#8a5a5a', win: '#fff0c0' },  // red brick
    { wall: '#b0c4a0', accent: '#90a480', roof: '#6a8460', win: '#fffff0' },  // green
    { wall: '#c8b8d0', accent: '#a898b0', roof: '#887898', win: '#fffae0' },  // purple
    { wall: '#e0d0b0', accent: '#c0b090', roof: '#a09070', win: '#fff8d0' },  // tan
    { wall: '#90b0c8', accent: '#7090a8', roof: '#506878', win: '#ffeeaa' },  // steel blue
  ];

  // Building types
  var TYPES = ['house', 'office', 'skyscraper', 'shop', 'apartment'];

  function makeBuilding(x, y, sizeClass) {
    var pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
    var type, bw, bh, floors;

    if (sizeClass === 0) { // tiny - houses & shops
      type = Math.random() > 0.5 ? 'house' : 'shop';
      bw = 22 + Math.random() * 14;
      bh = 25 + Math.random() * 20;
      floors = 1;
    } else if (sizeClass === 1) { // small
      type = Math.random() > 0.5 ? 'shop' : 'apartment';
      bw = 28 + Math.random() * 16;
      bh = 40 + Math.random() * 30;
      floors = 2 + Math.floor(Math.random() * 2);
    } else if (sizeClass === 2) { // medium
      type = 'apartment';
      bw = 35 + Math.random() * 20;
      bh = 60 + Math.random() * 40;
      floors = 3 + Math.floor(Math.random() * 3);
    } else if (sizeClass === 3) { // large
      type = 'office';
      bw = 45 + Math.random() * 25;
      bh = 90 + Math.random() * 50;
      floors = 5 + Math.floor(Math.random() * 4);
    } else { // huge skyscraper
      type = 'skyscraper';
      bw = 50 + Math.random() * 35;
      bh = 140 + Math.random() * 80;
      floors = 8 + Math.floor(Math.random() * 8);
    }

    // Windows per floor
    var winsPerFloor = Math.max(1, Math.floor(bw / 12));
    var floorH = bh / floors;

    // Pre-compute window lit states
    var windowLit = [];
    for (var wf = 0; wf < floors; wf++) {
      var row = [];
      for (var ww = 0; ww < winsPerFloor; ww++) {
        row.push(Math.random() > 0.3);
      }
      windowLit.push(row);
    }

    // Roof style
    var roofType = type === 'house' ? 'peaked' : (type === 'skyscraper' ? 'antenna' : (Math.random() > 0.5 ? 'flat' : 'ledge'));

    // Has door
    var doorW = Math.min(bw * 0.25, 10);
    var doorH = Math.min(floorH * 0.6, 16);

    // Awning for shops
    var hasAwning = type === 'shop' && Math.random() > 0.3;
    var awningColor = PALETTES[Math.floor(Math.random() * PALETTES.length)].wall;

    // AC units for apartments/offices
    var acUnits = [];
    if ((type === 'apartment' || type === 'office') && Math.random() > 0.5) {
      var numAC = 1 + Math.floor(Math.random() * 2);
      for (var ac = 0; ac < numAC; ac++) {
        acUnits.push({ floor: Math.floor(Math.random() * floors), side: Math.random() > 0.5 ? 'left' : 'right' });
      }
    }

    return {
      x: x, y: y, w: bw, h: bh, type: type, pal: pal,
      floors: floors, floorH: floorH, winsPerFloor: winsPerFloor,
      windowLit: windowLit,
      roofType: roofType, doorW: doorW, doorH: doorH,
      hasAwning: hasAwning, awningColor: awningColor, acUnits: acUnits,
      sizeClass: sizeClass,
      falling: false, fallProgress: 0, fallDir: 0,
      absorbed: false,
      shake: 0, shakeAmount: 0
    };
  }

  function initLevel(lvl) {
    level = lvl;
    worldW = 2000 + lvl * 300;
    worldH = 2000 + lvl * 300;
    player = { x: worldW / 2, y: worldH / 2, r: 25, startR: 25 };
    buildings = [];
    trees = [];
    particles = [];
    eaten = 0;
    maxBuildingW = 0;

    // Create city blocks with roads
    var blockSize = 200;
    var roadW = 40;
    var cols = Math.floor(worldW / (blockSize + roadW));
    var rows = Math.floor(worldH / (blockSize + roadW));

    // Determine building distribution based on level
    // More big buildings in later levels
    var sizeWeights;
    if (lvl <= 2) sizeWeights = [0.35, 0.30, 0.20, 0.10, 0.05];
    else if (lvl <= 4) sizeWeights = [0.20, 0.25, 0.25, 0.20, 0.10];
    else sizeWeights = [0.10, 0.15, 0.25, 0.25, 0.25];

    for (var col = 0; col < cols; col++) {
      for (var row = 0; row < rows; row++) {
        var blockX = roadW + col * (blockSize + roadW);
        var blockY = roadW + row * (blockSize + roadW);

        // Place 2-5 buildings per block
        var numBuildings = 2 + Math.floor(Math.random() * 4);
        for (var b = 0; b < numBuildings; b++) {
          // Pick size class
          var r = Math.random();
          var cumulative = 0;
          var sizeClass = 0;
          for (var s = 0; s < sizeWeights.length; s++) {
            cumulative += sizeWeights[s];
            if (r < cumulative) { sizeClass = s; break; }
          }

          var bx = blockX + 15 + Math.random() * (blockSize - 80);
          var by = blockY + 15 + Math.random() * (blockSize - 80);
          var building = makeBuilding(bx, by, sizeClass);
          buildings.push(building);
          if (building.w > maxBuildingW) maxBuildingW = building.w;
        }

        // Add some trees in the block
        var numTrees = Math.floor(Math.random() * 3);
        for (var ti = 0; ti < numTrees; ti++) {
          trees.push({
            x: blockX + 10 + Math.random() * (blockSize - 20),
            y: blockY + 10 + Math.random() * (blockSize - 20),
            r: 5 + Math.random() * 6,
            shade: Math.random() > 0.5 ? '#3a7a4a' : '#4a8a3a',
            absorbed: false
          });
        }
      }
    }

    // Spawn cars on roads
    cars = [];
    var roadW = 40;
    var blockSize = 200;
    var numCars = 20 + lvl * 8;
    for (var ci = 0; ci < numCars; ci++) {
      var horizontal = Math.random() > 0.5;
      var lane = Math.random() > 0.5 ? 0.3 : 0.7; // which lane
      var roadIdx, rx, ry, carDir;
      if (horizontal) {
        roadIdx = Math.floor(Math.random() * (Math.floor(worldH / (blockSize + roadW)) + 1));
        ry = roadIdx * (blockSize + roadW) + roadW * lane;
        rx = Math.random() * worldW;
        carDir = lane > 0.5 ? 1 : -1;
      } else {
        roadIdx = Math.floor(Math.random() * (Math.floor(worldW / (blockSize + roadW)) + 1));
        rx = roadIdx * (blockSize + roadW) + roadW * lane;
        ry = Math.random() * worldH;
        carDir = lane > 0.5 ? 1 : -1;
      }
      cars.push({
        x: rx, y: ry, horizontal: horizontal, dir: carDir,
        speed: 0.5 + Math.random() * 1.2,
        color: CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)],
        len: 14 + Math.random() * 8,
        w: 8 + Math.random() * 3
      });
    }

    // Spawn people on sidewalks
    people = [];
    var numPeople = 30 + lvl * 10;
    for (var pi = 0; pi < numPeople; pi++) {
      var pHoriz = Math.random() > 0.5;
      var pRoadIdx, px, py, pDir, pSide;
      pSide = Math.random() > 0.5 ? -1 : 1; // which side of road
      if (pHoriz) {
        pRoadIdx = Math.floor(Math.random() * (Math.floor(worldH / (blockSize + roadW)) + 1));
        py = pRoadIdx * (blockSize + roadW) + (pSide > 0 ? roadW + 3 : -3);
        px = Math.random() * worldW;
        pDir = Math.random() > 0.5 ? 1 : -1;
      } else {
        pRoadIdx = Math.floor(Math.random() * (Math.floor(worldW / (blockSize + roadW)) + 1));
        px = pRoadIdx * (blockSize + roadW) + (pSide > 0 ? roadW + 3 : -3);
        py = Math.random() * worldH;
        pDir = Math.random() > 0.5 ? 1 : -1;
      }
      people.push({
        x: px, y: py, horizontal: pHoriz, dir: pDir,
        speed: 0.2 + Math.random() * 0.4,
        skin: SKIN_COLORS[Math.floor(Math.random() * SKIN_COLORS.length)],
        shirt: SHIRT_COLORS[Math.floor(Math.random() * SHIRT_COLORS.length)],
        step: Math.random() * Math.PI * 2
      });
    }

    totalBuildings = buildings.length;
    document.getElementById('score').textContent = score;
    document.getElementById('level-label').textContent = level;
    updateSizeBar();
  }

  function updateSizeBar() {
    var pct = Math.min(100, ((player.r - player.startR) / (maxBuildingW * 0.8)) * 100 + 15);
    document.getElementById('size-bar').style.width = pct + '%';
  }

  // Input
  touching = false; touchX = 0; touchY = 0;
  canvas.addEventListener('touchstart', function(e) { e.preventDefault(); touching = true; touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; touchX = touchStartX; touchY = touchStartY; });
  canvas.addEventListener('touchmove', function(e) { e.preventDefault(); touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; });
  canvas.addEventListener('touchend', function(e) { e.preventDefault(); touching = false; });
  var mouseDown = false;
  canvas.addEventListener('mousedown', function(e) { mouseDown = true; touchStartX = e.clientX; touchStartY = e.clientY; touchX = e.clientX; touchY = e.clientY; touching = true; });
  canvas.addEventListener('mousemove', function(e) { if (mouseDown) { touchX = e.clientX; touchY = e.clientY; } });
  canvas.addEventListener('mouseup', function() { mouseDown = false; touching = false; });

  function spawnParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      var a = Math.random() * Math.PI * 2;
      var sp = 1 + Math.random() * 4;
      particles.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: 2 + Math.random() * 4, color: color, life: 1 });
    }
  }

  function spawnDebris(x, y, w, pal, count) {
    for (var i = 0; i < count; i++) {
      var a = Math.random() * Math.PI * 2;
      var sp = 2 + Math.random() * 5;
      var colors = [pal.wall, pal.accent, pal.roof, '#888'];
      particles.push({ x: x + Math.random() * w, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2, r: 2 + Math.random() * 5, color: colors[Math.floor(Math.random() * colors.length)], life: 1, gravity: true });
    }
  }

  function update() {
    if (!gameRunning) return;

    if (touching) {
      var dx = touchX - touchStartX;
      var dy = touchY - touchStartY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 5) {
        var speed = Math.min(dist * 0.04, 3.5);
        player.x += (dx / dist) * speed;
        player.y += (dy / dist) * speed;
      }
    }

    player.x = Math.max(player.r, Math.min(worldW - player.r, player.x));
    player.y = Math.max(player.r, Math.min(worldH - player.r, player.y));
    bladeAngle += 0.08;

    camX = player.x - W / 2;
    camY = player.y - H / 2;
    camX = Math.max(0, Math.min(worldW - W, camX));
    camY = Math.max(0, Math.min(worldH - H, camY));

    // Eat trees
    for (var i = trees.length - 1; i >= 0; i--) {
      var tr = trees[i];
      if (tr.absorbed) continue;
      if (player.r < tr.r * 1.5) continue;
      var dx = tr.x - player.x;
      var dy = tr.y - player.y;
      if (Math.sqrt(dx * dx + dy * dy) < player.r) {
        tr.absorbed = true;
        player.r += 0.05;
        spawnParticles(tr.x, tr.y, tr.shade, 4);
      }
    }

    // Check building collisions
    var showTooSmall = false;
    for (var i = buildings.length - 1; i >= 0; i--) {
      var b = buildings[i];
      if (b.absorbed) continue;

      var canEat = player.r * 2 > b.w * 0.9;
      var cx = b.x + b.w / 2;
      var cy = b.y + b.w / 2;
      var dx = cx - player.x;
      var dy = cy - player.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var touchDist = player.r + b.w * 0.3;

      if (!b.falling && dist < touchDist) {
        if (canEat) {
          b.falling = true;
          b.fallDir = Math.atan2(dy, dx);
          spawnDebris(b.x, b.y, b.w, b.pal, 10 + b.sizeClass * 4);
        } else {
          // Bump — too small
          b.shake = 10;
          b.shakeAmount = 3;
          showTooSmall = true;
          tooSmallTimer = 60;
        }
      }

      if (b.shake > 0) b.shake--;

      if (b.falling && !b.absorbed) {
        b.fallProgress += 0.035;
        if (b.fallProgress >= 1) {
          b.absorbed = true;
          eaten++;
          score += Math.floor(b.h * b.w / 8) * (b.sizeClass + 1);
          player.r += b.w * 0.018 + b.sizeClass * 0.2;
          document.getElementById('score').textContent = score;
          updateSizeBar();
          spawnDebris(b.x, b.y, b.w, b.pal, 6);
        }
      }
    }

    if (tooSmallTimer > 0) {
      tooSmallTimer--;
      document.getElementById('too-small').style.opacity = tooSmallTimer > 0 ? '1' : '0';
    }

    // Update cars
    for (var i = 0; i < cars.length; i++) {
      var c = cars[i];
      if (c.horizontal) { c.x += c.speed * c.dir; if (c.x > worldW + 30) c.x = -30; if (c.x < -30) c.x = worldW + 30; }
      else { c.y += c.speed * c.dir; if (c.y > worldH + 30) c.y = -30; if (c.y < -30) c.y = worldH + 30; }
    }

    // Update people
    for (var i = 0; i < people.length; i++) {
      var pe = people[i];
      pe.step += 0.1;
      if (pe.horizontal) { pe.x += pe.speed * pe.dir; if (pe.x > worldW + 20) pe.x = -20; if (pe.x < -20) pe.x = worldW + 20; }
      else { pe.y += pe.speed * pe.dir; if (pe.y > worldH + 20) pe.y = -20; if (pe.y < -20) pe.y = worldH + 20; }
      // Flee from blender if close
      var pdx = pe.x - player.x;
      var pdy = pe.y - player.y;
      var pdist = Math.sqrt(pdx * pdx + pdy * pdy);
      if (pdist < player.r + 40 && pdist > 0) {
        pe.x += (pdx / pdist) * 2.5;
        pe.y += (pdy / pdist) * 2.5;
      }
    }

    // Particles
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.gravity) p.vy += 0.15;
      p.life -= 0.02;
      if (p.life <= 0) particles.splice(i, 1);
    }

    var pct = totalBuildings > 0 ? (eaten / totalBuildings) * 100 : 0;
    document.getElementById('progress-bar').style.width = pct + '%';

    if (eaten >= totalBuildings) {
      gameRunning = false;
      setTimeout(function() { showLevelScreen(level + 1); }, 600);
    }
  }

  function drawGround() {
    // Grass base
    ctx.fillStyle = '#4a7a3a';
    ctx.fillRect(0, 0, W, H);

    var roadW = 40;
    var blockSize = 200;
    var cols = Math.floor(worldW / (blockSize + roadW)) + 1;
    var rows = Math.floor(worldH / (blockSize + roadW)) + 1;

    // Draw roads
    ctx.fillStyle = '#555';
    for (var col = 0; col <= cols; col++) {
      var rx = col * (blockSize + roadW) - camX;
      ctx.fillRect(rx, -camY, roadW, worldH);
      // Center line
      ctx.strokeStyle = '#ee0';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([12, 8]);
      ctx.beginPath();
      ctx.moveTo(rx + roadW / 2, -camY);
      ctx.lineTo(rx + roadW / 2, worldH - camY);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    for (var row = 0; row <= rows; row++) {
      var ry = row * (blockSize + roadW) - camY;
      ctx.fillRect(-camX, ry, worldW, roadW);
      ctx.strokeStyle = '#ee0';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([12, 8]);
      ctx.beginPath();
      ctx.moveTo(-camX, ry + roadW / 2);
      ctx.lineTo(worldW - camX, ry + roadW / 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Sidewalks along roads
    ctx.fillStyle = '#999';
    for (var col = 0; col <= cols; col++) {
      var rx = col * (blockSize + roadW) - camX;
      ctx.fillRect(rx - 4, -camY, 4, worldH);
      ctx.fillRect(rx + roadW, -camY, 4, worldH);
    }
    for (var row = 0; row <= rows; row++) {
      var ry = row * (blockSize + roadW) - camY;
      ctx.fillRect(-camX, ry - 4, worldW, 4);
      ctx.fillRect(-camX, ry + roadW, worldW, 4);
    }
  }

  function drawTree(t) {
    if (t.absorbed) return;
    var sx = t.x - camX;
    var sy = t.y - camY;
    if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) return;

    // Trunk
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(sx - 2, sy - 2, 4, 6);
    // Canopy
    ctx.fillStyle = t.shade;
    ctx.beginPath();
    ctx.arc(sx, sy - 4, t.r, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.arc(sx - t.r * 0.25, sy - 4 - t.r * 0.25, t.r * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawBuilding(b) {
    if (b.absorbed) return;
    var sx = b.x - camX;
    var sy = b.y - camY;
    if (sx + b.w < -60 || sx > W + 60 || sy - b.h < -60 || sy > H + 60) return;

    var canEat = player.r * 2 > b.w * 0.9;

    ctx.save();

    // Shake
    var shakeX = 0;
    if (b.shake > 0) shakeX = Math.sin(b.shake * 2) * b.shakeAmount;

    if (b.falling) {
      var p = b.fallProgress;
      var scale = 1 - p;
      var moveX = (player.x - camX - sx - b.w / 2) * p;
      var moveY = (player.y - camY - sy) * p;
      ctx.translate(sx + b.w / 2 + moveX, sy + moveY);
      ctx.rotate(p * 3 * (b.fallDir > 0 ? 1 : -1));
      ctx.scale(scale, scale);
      ctx.translate(-b.w / 2, 0);
      ctx.globalAlpha = 1 - p * 0.6;
    } else {
      ctx.translate(sx + shakeX, sy);
    }

    // Shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(b.w / 2, 6, b.w * 0.6, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Main building body (drawn upward from base)
    // Side face (3D effect)
    var depth = 6;
    ctx.fillStyle = b.pal.accent;
    ctx.beginPath();
    ctx.moveTo(b.w, 0);
    ctx.lineTo(b.w + depth, -depth);
    ctx.lineTo(b.w + depth, -b.h - depth);
    ctx.lineTo(b.w, -b.h);
    ctx.closePath();
    ctx.fill();

    // Top face
    ctx.fillStyle = b.pal.roof;
    ctx.beginPath();
    ctx.moveTo(0, -b.h);
    ctx.lineTo(depth, -b.h - depth);
    ctx.lineTo(b.w + depth, -b.h - depth);
    ctx.lineTo(b.w, -b.h);
    ctx.closePath();
    ctx.fill();

    // Front face
    ctx.fillStyle = b.pal.wall;
    ctx.fillRect(0, -b.h, b.w, b.h);

    // Floor lines
    for (var f = 0; f < b.floors; f++) {
      var fy = -b.floorH * f;
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      ctx.fillRect(0, fy - 1, b.w, 1);
    }

    // Brick/panel lines for detail
    if (b.type === 'house' || b.type === 'apartment') {
      ctx.strokeStyle = 'rgba(0,0,0,0.05)';
      ctx.lineWidth = 0.5;
      var brickH = 4;
      for (var br = 0; br < b.h / brickH; br++) {
        var bry = -br * brickH;
        ctx.beginPath(); ctx.moveTo(0, bry); ctx.lineTo(b.w, bry); ctx.stroke();
        // Offset bricks every other row
        if (br % 2 === 0) {
          for (var bx = 0; bx < b.w; bx += 10) {
            ctx.beginPath(); ctx.moveTo(bx, bry); ctx.lineTo(bx, bry - brickH); ctx.stroke();
          }
        } else {
          for (var bx = 5; bx < b.w; bx += 10) {
            ctx.beginPath(); ctx.moveTo(bx, bry); ctx.lineTo(bx, bry - brickH); ctx.stroke();
          }
        }
      }
    } else if (b.type === 'office' || b.type === 'skyscraper') {
      // Vertical panel lines
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 0.5;
      var panelW = b.w / (b.winsPerFloor + 1);
      for (var pl = 1; pl <= b.winsPerFloor; pl++) {
        ctx.beginPath(); ctx.moveTo(pl * panelW, -b.h); ctx.lineTo(pl * panelW, 0); ctx.stroke();
      }
    }

    // Windows (using pre-computed lit states)
    var winW = 5;
    var winH = 6;
    var winGap = (b.w - 6) / b.winsPerFloor;
    for (var f = 0; f < b.floors; f++) {
      var fy = -b.floorH * f - b.floorH * 0.4;
      for (var wi = 0; wi < b.winsPerFloor; wi++) {
        var wx = 5 + wi * winGap;
        // Window frame
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(wx - 1, fy - winH - 1, winW + 2, winH + 2);
        // Window glass - stable lit state
        var lit = b.windowLit[f][wi];
        ctx.fillStyle = lit ? b.pal.win : 'rgba(40,60,80,0.8)';
        ctx.fillRect(wx, fy - winH, winW, winH);
        // Window cross divider
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(wx + winW/2, fy - winH); ctx.lineTo(wx + winW/2, fy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(wx, fy - winH/2); ctx.lineTo(wx + winW, fy - winH/2); ctx.stroke();
        // Subtle glare
        if (lit) {
          ctx.fillStyle = 'rgba(255,255,255,0.15)';
          ctx.fillRect(wx, fy - winH, winW * 0.35, winH * 0.35);
        }
        // Window sill
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(wx - 1, fy, winW + 2, 1.5);
      }
    }

    // AC units
    for (var ac = 0; ac < b.acUnits.length; ac++) {
      var unit = b.acUnits[ac];
      var acY = -unit.floor * b.floorH - b.floorH * 0.3;
      var acX = unit.side === 'left' ? -4 : b.w;
      ctx.fillStyle = '#bbb';
      ctx.fillRect(acX, acY - 5, 5, 5);
      ctx.fillStyle = '#999';
      ctx.fillRect(acX + 0.5, acY - 4.5, 4, 1);
      ctx.fillRect(acX + 0.5, acY - 2.5, 4, 1);
    }

    // Door (ground floor)
    ctx.fillStyle = '#4a3020';
    var doorX = b.w / 2 - b.doorW / 2;
    ctx.fillRect(doorX, -b.doorH, b.doorW, b.doorH);
    // Door panels
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(doorX + 2, -b.doorH + 2, b.doorW - 4, b.doorH * 0.4);
    ctx.strokeRect(doorX + 2, -b.doorH * 0.5, b.doorW - 4, b.doorH * 0.4);
    // Door window
    ctx.fillStyle = 'rgba(200,220,240,0.3)';
    ctx.fillRect(doorX + 2, -b.doorH + 2, b.doorW - 4, b.doorH * 0.35);
    // Door knob
    ctx.fillStyle = '#c0a040';
    ctx.beginPath();
    ctx.arc(doorX + b.doorW * 0.78, -b.doorH * 0.35, 1.2, 0, Math.PI * 2);
    ctx.fill();
    // Door step
    ctx.fillStyle = '#888';
    ctx.fillRect(doorX - 3, 0, b.doorW + 6, 2);

    // Shop awning
    if (b.hasAwning) {
      ctx.fillStyle = b.awningColor;
      ctx.beginPath();
      ctx.moveTo(0, -b.doorH - 4);
      ctx.lineTo(b.w, -b.doorH - 4);
      ctx.lineTo(b.w + 4, -b.doorH + 6);
      ctx.lineTo(-4, -b.doorH + 6);
      ctx.closePath();
      ctx.fill();
      // Awning stripes
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      for (var as = 0; as < b.w; as += 6) {
        ctx.fillRect(as, -b.doorH - 4, 3, 10);
      }
    }

    // Roof details
    if (b.roofType === 'peaked') {
      ctx.fillStyle = b.pal.roof;
      ctx.beginPath();
      ctx.moveTo(-2, -b.h);
      ctx.lineTo(b.w / 2, -b.h - 15);
      ctx.lineTo(b.w + 2, -b.h);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.beginPath();
      ctx.moveTo(-2, -b.h);
      ctx.lineTo(b.w / 2, -b.h - 15);
      ctx.lineTo(b.w / 2, -b.h);
      ctx.closePath();
      ctx.fill();
      // Chimney
      ctx.fillStyle = '#8a6040';
      ctx.fillRect(b.w * 0.7, -b.h - 12, 6, 12);
      ctx.fillStyle = '#666';
      ctx.fillRect(b.w * 0.7 - 1, -b.h - 14, 8, 3);
    } else if (b.roofType === 'antenna') {
      // Rooftop equipment
      ctx.fillStyle = '#777';
      ctx.fillRect(b.w * 0.15, -b.h - 5, 8, 5);
      ctx.fillRect(b.w * 0.6, -b.h - 3, 6, 3);
      // Antenna
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(b.w / 2, -b.h);
      ctx.lineTo(b.w / 2, -b.h - 20);
      ctx.stroke();
      // Steady red light (no more flashing)
      ctx.fillStyle = '#ff3030';
      ctx.beginPath();
      ctx.arc(b.w / 2, -b.h - 20, 2, 0, Math.PI * 2);
      ctx.fill();
      // Subtle glow around light
      ctx.fillStyle = 'rgba(255,48,48,0.15)';
      ctx.beginPath();
      ctx.arc(b.w / 2, -b.h - 20, 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (b.roofType === 'ledge') {
      ctx.fillStyle = b.pal.accent;
      ctx.fillRect(-3, -b.h - 4, b.w + 6, 5);
      // Rooftop railing
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, -b.h - 6); ctx.lineTo(b.w, -b.h - 6); ctx.stroke();
      for (var rl = 0; rl < b.w; rl += 8) {
        ctx.beginPath(); ctx.moveTo(rl, -b.h - 4); ctx.lineTo(rl, -b.h - 7); ctx.stroke();
      }
    }

    // Base/foundation
    ctx.fillStyle = '#666';
    ctx.fillRect(-2, -2, b.w + 4, 4);
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(-2, 0, b.w + 4, 2);

    ctx.restore();
  }

  function drawBlender() {
    var sx = player.x - camX;
    var sy = player.y - camY;
    var r = player.r;

    ctx.save();

    // Outer cracked earth rim
    ctx.beginPath();
    ctx.arc(sx, sy, r + 8, 0, Math.PI * 2);
    var rimGrad = ctx.createRadialGradient(sx, sy, r - 2, sx, sy, r + 8);
    rimGrad.addColorStop(0, 'rgba(60,40,20,0.6)');
    rimGrad.addColorStop(0.5, 'rgba(80,60,30,0.3)');
    rimGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = rimGrad;
    ctx.fill();

    // Crack lines radiating outward
    ctx.strokeStyle = 'rgba(40,30,15,0.4)';
    ctx.lineWidth = 1;
    for (var c = 0; c < 12; c++) {
      var ca = (Math.PI * 2 / 12) * c + bladeAngle * 0.02;
      ctx.beginPath();
      ctx.moveTo(sx + Math.cos(ca) * r * 0.95, sy + Math.sin(ca) * r * 0.95);
      ctx.lineTo(sx + Math.cos(ca) * (r + 6 + Math.sin(c * 3) * 3), sy + Math.sin(ca) * (r + 6 + Math.sin(c * 3) * 3));
      ctx.stroke();
    }

    // Hole shadow ring
    ctx.beginPath();
    ctx.arc(sx, sy, r + 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fill();

    // Main hole with deeper gradient
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    var grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
    grad.addColorStop(0, '#020204');
    grad.addColorStop(0.3, '#060610');
    grad.addColorStop(0.6, '#0a0a18');
    grad.addColorStop(0.85, '#141428');
    grad.addColorStop(1, '#1e1e38');
    ctx.fillStyle = grad;
    ctx.fill();

    // Inner depth rings
    for (var dr = 0; dr < 4; dr++) {
      var ringR = r * (0.3 + dr * 0.18);
      ctx.beginPath();
      ctx.arc(sx, sy, ringR, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(100,100,140,' + (0.06 - dr * 0.01) + ')';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Spiral vortex lines (3 spirals, 2 full rotations)
    for (var s = 0; s < 3; s++) {
      var startA = bladeAngle * 1.5 + (Math.PI * 2 / 3) * s;
      ctx.beginPath();
      for (var a = 0; a < Math.PI * 4; a += 0.08) {
        var spiralR = (a / (Math.PI * 4)) * r * 0.88;
        var opacity = 1 - (a / (Math.PI * 4));
        var px = sx + Math.cos(startA + a) * spiralR;
        var py = sy + Math.sin(startA + a) * spiralR;
        if (a === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.strokeStyle = 'rgba(232,93,38,' + 0.2 + ')';
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    // 6 curved blades with thickness
    for (var i = 0; i < 6; i++) {
      var a = bladeAngle + (Math.PI / 3) * i;

      // Blade body (filled curved shape)
      ctx.beginPath();
      var innerR = r * 0.12;
      var outerR = r * 0.9;
      // Leading edge
      ctx.moveTo(sx + Math.cos(a) * innerR, sy + Math.sin(a) * innerR);
      ctx.quadraticCurveTo(
        sx + Math.cos(a + 0.35) * r * 0.55,
        sy + Math.sin(a + 0.35) * r * 0.55,
        sx + Math.cos(a + 0.08) * outerR,
        sy + Math.sin(a + 0.08) * outerR
      );
      // Tip
      ctx.lineTo(sx + Math.cos(a - 0.04) * outerR, sy + Math.sin(a - 0.04) * outerR);
      // Trailing edge
      ctx.quadraticCurveTo(
        sx + Math.cos(a + 0.15) * r * 0.45,
        sy + Math.sin(a + 0.15) * r * 0.45,
        sx + Math.cos(a) * innerR,
        sy + Math.sin(a) * innerR
      );
      ctx.closePath();
      ctx.fillStyle = 'rgba(200,90,30,0.5)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(232,93,38,0.7)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Blade highlight edge
      ctx.beginPath();
      ctx.moveTo(sx + Math.cos(a) * innerR, sy + Math.sin(a) * innerR);
      ctx.quadraticCurveTo(
        sx + Math.cos(a + 0.35) * r * 0.55,
        sy + Math.sin(a + 0.35) * r * 0.55,
        sx + Math.cos(a + 0.08) * outerR,
        sy + Math.sin(a + 0.08) * outerR
      );
      ctx.strokeStyle = 'rgba(255,160,80,0.35)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Center hub - metallic look
    var hubR = r * 0.12;
    ctx.beginPath();
    ctx.arc(sx, sy, hubR, 0, Math.PI * 2);
    var hubGrad = ctx.createRadialGradient(sx - hubR * 0.3, sy - hubR * 0.3, 0, sx, sy, hubR);
    hubGrad.addColorStop(0, '#ff8040');
    hubGrad.addColorStop(0.5, '#e85d26');
    hubGrad.addColorStop(1, '#a03010');
    ctx.fillStyle = hubGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,200,150,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Hub bolt dots
    for (var b = 0; b < 4; b++) {
      var ba = bladeAngle * 0.5 + (Math.PI / 2) * b;
      ctx.beginPath();
      ctx.arc(sx + Math.cos(ba) * hubR * 0.6, sy + Math.sin(ba) * hubR * 0.6, 1.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fill();
    }

    // Outer edge - ground lip with texture
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.strokeStyle = '#3a3020';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(232,93,38,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Subtle inner glow
    ctx.beginPath();
    ctx.arc(sx, sy, r * 0.6, 0, Math.PI * 2);
    var glowGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 0.6);
    glowGrad.addColorStop(0, 'rgba(232,93,38,0.06)');
    glowGrad.addColorStop(1, 'rgba(232,93,38,0)');
    ctx.fillStyle = glowGrad;
    ctx.fill();

    ctx.restore();
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      var psx = p.x - camX;
      var psy = p.y - camY;
      // Draw as small rectangles for debris effect
      ctx.save();
      ctx.translate(psx, psy);
      ctx.rotate(p.life * 5);
      ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawCar(c) {
    var sx = c.x - camX;
    var sy = c.y - camY;
    if (sx < -30 || sx > W + 30 || sy < -30 || sy > H + 30) return;
    ctx.save();
    ctx.translate(sx, sy);
    if (!c.horizontal) ctx.rotate(Math.PI / 2);
    if (c.dir < 0) ctx.scale(-1, 1);
    var hw = c.w / 2;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(-c.len / 2 + 1, -hw + 1, c.len, c.w);
    // Body
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.roundRect(-c.len / 2, -hw, c.len, c.w, 2);
    ctx.fill();
    // Roof/cabin
    ctx.fillStyle = 'rgba(150,200,230,0.5)';
    ctx.beginPath();
    ctx.roundRect(-c.len * 0.15, -hw + 1.5, c.len * 0.4, c.w - 3, 1.5);
    ctx.fill();
    // Headlights
    ctx.fillStyle = '#ffffaa';
    ctx.fillRect(c.len / 2 - 2, -hw + 1, 2, 2);
    ctx.fillRect(c.len / 2 - 2, hw - 3, 2, 2);
    // Taillights
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(-c.len / 2, -hw + 1, 2, 2);
    ctx.fillRect(-c.len / 2, hw - 3, 2, 2);
    // Wheel wells
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-c.len * 0.35, -hw - 0.5, 4, 1.5);
    ctx.fillRect(-c.len * 0.35, hw - 1, 4, 1.5);
    ctx.fillRect(c.len * 0.2, -hw - 0.5, 4, 1.5);
    ctx.fillRect(c.len * 0.2, hw - 1, 4, 1.5);
    ctx.restore();
  }

  function drawPerson(pe) {
    var sx = pe.x - camX;
    var sy = pe.y - camY;
    if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) return;
    ctx.save();
    ctx.translate(sx, sy);
    var bob = Math.sin(pe.step) * 0.8;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.ellipse(0, 3, 3, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Legs
    var legSpread = Math.sin(pe.step) * 1.5;
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-legSpread, 3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(legSpread, 3); ctx.stroke();
    // Body/shirt
    ctx.fillStyle = pe.shirt;
    ctx.fillRect(-2, -4 + bob, 4, 4);
    // Arms
    var armSwing = Math.sin(pe.step) * 1.2;
    ctx.strokeStyle = pe.skin;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-2, -3 + bob); ctx.lineTo(-3.5, -1 + armSwing + bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2, -3 + bob); ctx.lineTo(3.5, -1 - armSwing + bob); ctx.stroke();
    // Head
    ctx.fillStyle = pe.skin;
    ctx.beginPath();
    ctx.arc(0, -5.5 + bob, 2.2, 0, Math.PI * 2);
    ctx.fill();
    // Hair
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.arc(0, -6 + bob, 2.2, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawGround();

    // Draw cars on roads
    for (var i = 0; i < cars.length; i++) drawCar(cars[i]);

    // Draw people on sidewalks
    for (var i = 0; i < people.length; i++) drawPerson(people[i]);

    // Draw trees
    for (var i = 0; i < trees.length; i++) drawTree(trees[i]);

    // Sort buildings by y for depth
    var sorted = buildings.filter(function(b) { return !b.absorbed; });
    sorted.sort(function(a, b) { return a.y - b.y; });

    // Draw buildings behind player
    for (var i = 0; i < sorted.length; i++) {
      if (sorted[i].y < player.y) drawBuilding(sorted[i]);
    }

    drawBlender();

    // Draw buildings in front of player
    for (var i = 0; i < sorted.length; i++) {
      if (sorted[i].y >= player.y) drawBuilding(sorted[i]);
    }

    drawParticles();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  function showLevelScreen(lvl) {
    document.getElementById('level-title').textContent = 'Level ' + lvl;
    document.getElementById('level-sub').textContent = lvl > 1 ? 'City destroyed! Next district...' : 'Clear the city!';
    document.getElementById('level-screen').style.display = 'flex';
  }

  // Animated start screen skyline
  (function() {
    var sc = document.getElementById('start-city-canvas');
    var sctx = sc.getContext('2d');
    var skyBuildings = [];
    function resizeSky() {
      sc.width = sc.offsetWidth;
      sc.height = sc.offsetHeight;
      skyBuildings = [];
      for (var x = 0; x < sc.width + 40; x += 12 + Math.random() * 20) {
        var bw = 10 + Math.random() * 25;
        var bh = 30 + Math.random() * (sc.height * 0.6);
        var wins = [];
        var floors = Math.floor(bh / 12);
        var wpc = Math.max(1, Math.floor(bw / 8));
        for (var f = 0; f < floors; f++) {
          for (var w = 0; w < wpc; w++) {
            wins.push({ f: f, w: w, lit: Math.random() > 0.4 });
          }
        }
        skyBuildings.push({ x: x, w: bw, h: bh, wins: wins, wpc: wpc, floors: floors,
          color: 'hsl(' + (210 + Math.random() * 30) + ',' + (10 + Math.random() * 15) + '%,' + (8 + Math.random() * 12) + '%)',
          lightColor: 'hsl(' + (40 + Math.random() * 20) + ',80%,' + (60 + Math.random() * 20) + '%)'
        });
      }
    }
    resizeSky();
    var skyAngle = 0;
    function drawSky() {
      if (!document.getElementById('start-screen').offsetParent && document.getElementById('start-screen').style.display === 'none') return;
      sctx.clearRect(0, 0, sc.width, sc.height);
      skyAngle += 0.01;
      for (var i = 0; i < skyBuildings.length; i++) {
        var b = skyBuildings[i];
        var by = sc.height - b.h;
        sctx.fillStyle = b.color;
        sctx.fillRect(b.x, by, b.w, b.h);
        // Windows
        var ww = 3, wh = 3;
        var gap = (b.w - 4) / b.wpc;
        for (var j = 0; j < b.wins.length; j++) {
          var win = b.wins[j];
          if (!win.lit) continue;
          var wx = b.x + 3 + win.w * gap;
          var wy = by + 4 + win.f * 12;
          sctx.fillStyle = b.lightColor;
          sctx.globalAlpha = 0.5 + Math.sin(skyAngle + j * 0.5) * 0.2;
          sctx.fillRect(wx, wy, ww, wh);
          sctx.globalAlpha = 1;
        }
      }
      requestAnimationFrame(drawSky);
    }
    drawSky();
    window.addEventListener('resize', resizeSky);
  })();

  // Rotate logo blades on start screen
  (function() {
    var angle = 0;
    var blades = document.querySelectorAll('.logo-blade');
    function spinLogo() {
      if (!document.getElementById('start-screen').offsetParent && document.getElementById('start-screen').style.display === 'none') return;
      angle += 1.5;
      for (var i = 0; i < blades.length; i++) {
        blades[i].style.transform = 'rotate(' + (angle + i * 60) + 'deg)';
      }
      requestAnimationFrame(spinLogo);
    }
    spinLogo();
  })();

  document.getElementById('start-btn').addEventListener('click', function() {
    document.getElementById('start-screen').style.display = 'none';
    score = 0;
    initLevel(1);
    gameRunning = true;
    loop();
  });

  document.getElementById('level-btn').addEventListener('click', function() {
    document.getElementById('level-screen').style.display = 'none';
    initLevel(level);
    gameRunning = true;
  });
})();
</script>
